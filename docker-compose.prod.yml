version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: engineering_brain_db
    environment:
      POSTGRES_DB: engineering_brain
      POSTGRES_USER: eb_user
      POSTGRES_PASSWORD: eb_secure_password
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=vector"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/app/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eb_user -d engineering_brain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engineering_brain

  # Redis for job queue and caching
  redis:
    image: redis:7-alpine
    container_name: engineering_brain_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engineering_brain

  # Ollama for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: engineering_brain_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - engineering_brain

  # PgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: engineering_brain_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@engineering-brain.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - engineering_brain

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: engineering_brain_prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - engineering_brain

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  prometheus_data:

networks:
  engineering_brain:
    driver: bridge
