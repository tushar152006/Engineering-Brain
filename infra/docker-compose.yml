services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: engineering_brain
      POSTGRES_PASSWORD: engineering_brain
      POSTGRES_DB: engineering_brain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/engineeringbrain
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:

